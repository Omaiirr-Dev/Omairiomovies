  <style>
    * { scrollbar-width: thin; scrollbar-color: #333 transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }

    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    body { background: #0a0a0a; overflow-x: hidden; }

    .skeleton { background: linear-gradient(90deg, #1a1a1f 25%, #222228 50%, #1a1a1f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    .fade-scale { animation: fadeScale 0.3s ease-out; }

    .card { transition: transform 0.25s ease, box-shadow 0.25s ease; }

    .genre-chip.active { background: #e11d48; border-color: #e11d48; color: white; }

    .row-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .row-scroll > * { scroll-snap-align: start; }
    .progress-bar { transition: width 0.3s ease; }

    .server-btn { transition: all 0.15s ease; }
    .server-btn:hover { background: rgba(225,29,72,0.15); border-color: #e11d48; }
    .server-btn.active { background: #e11d48; border-color: #e11d48; }
    .server-btn.tried { opacity: 0.4; }

    .server-btn.trying::after { content:''; width:8px; height:8px; border:2px solid #facc15; border-top-color:transparent; border-radius:50%; animation:spin 0.6s linear infinite; margin-left:4px; display:inline-block; }

    .ep-btn.watched { border-left: 3px solid #e11d48; background: rgba(225,29,72,0.08); }
    .hero-gradient { background: linear-gradient(to right, #0a0a0a 0%, rgba(10,10,10,0.85) 40%, rgba(10,10,10,0.4) 70%, transparent 100%); }
    .hero-gradient-bottom { background: linear-gradient(to top, #0a0a0a 0%, transparent 100%); }

    /* Block common ad overlay injections */
    iframe + div[style*="z-index: 999"],
    iframe + div[style*="z-index:999"],
    iframe ~ div[id*="pop"],
    iframe ~ div[id*="overlay"],
    iframe ~ div[class*="pop"],
    iframe ~ div[class*="overlay"],
    div[id*="adb"], div[class*="adb"],
    div[id*="ad-"], div[class*="ad-"] { display: none !important; }

  <script>
  // ══════════════════════════════════════════════════════════════════════
  // LOCK SCREEN (defined first so it always works)
  // ══════════════════════════════════════════════════════════════════════
  window.tryUnlock = function() {
    const input = document.getElementById('lockInput');
    const screen = document.getElementById('lockScreen');
    const val = input.value.trim().toLowerCase();
    if (val === 'oooo') {
      sessionStorage.setItem('omair_unlocked', '1');
      screen.style.transition = 'opacity 0.3s ease';
      screen.style.opacity = '0';
      setTimeout(() => { screen.style.display = 'none'; }, 300);
    } else {
      document.getElementById('lockError').textContent = 'Wrong password';
      document.getElementById('lockError').classList.remove('hidden');
      input.value = '';
      setTimeout(() => { document.getElementById('lockError').classList.add('hidden'); }, 2000);
    }
  };
  // Enter key support
  document.getElementById('lockInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  // Auto-hide if already unlocked
  if (sessionStorage.getItem('omair_unlocked') === '1') document.getElementById('lockScreen').style.display = 'none';

  // ══════════════════════════════════════════════════════════════════════
  // CONFIG
  // ══════════════════════════════════════════════════════════════════════
  const API_KEY  = '699b8c71cf0dd6893a8aac2b0f57cbc9';
  const API      = 'https://api.themoviedb.org/3';
  const IMG      = 'https://image.tmdb.org/t/p';
  const IMG_W500 = `${IMG}/w500`;
  const IMG_OG   = `${IMG}/original`;

  // ─── MOVIE/TV SERVERS ───────────────────────────────────────────────
  const SERVERS = [
    { name: 'Vidlink',   movie: id => `https://vidlink.pro/movie/${id}?autoplay=true`,   tv: (id,s,e) => `https://vidlink.pro/tv/${id}/${s}/${e}?autoplay=true` },
    { name: 'VidSrc',    movie: id => `https://vidsrc.cc/v2/embed/movie/${id}`,          tv: (id,s,e) => `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}` },
    { name: 'Embed',     movie: id => `https://embed.su/embed/movie/${id}`,              tv: (id,s,e) => `https://embed.su/embed/tv/${id}/${s}/${e}` },
    { name: 'Auto',      movie: id => `https://player.autoembed.cc/embed/movie/${id}`,   tv: (id,s,e) => `https://player.autoembed.cc/embed/tv/${id}/${s}/${e}` },
    { name: 'Multi',     movie: id => `https://multiembed.mov/?video_id=${id}&tmdb=1`,   tv: (id,s,e) => `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}` },
    { name: '2Embed',    movie: id => `https://www.2embed.stream/embed/movie/${id}`,     tv: (id,s,e) => `https://www.2embed.stream/embed/tv/${id}/${s}/${e}` },
    { name: 'MoviesAPI', movie: id => `https://moviesapi.club/movie/${id}`,              tv: (id,s,e) => `https://moviesapi.club/tv/${id}/${s}/${e}` },
    { name: 'VidSrc2',   movie: id => `https://vidsrc.icu/embed/movie/${id}`,            tv: (id,s,e) => `https://vidsrc.icu/embed/tv/${id}/${s}/${e}` },
  ];

  // ─── ANIME SERVERS (English Dub — 1080p) ───────────────────────────
  // These use MAL (MyAnimeList) IDs with explicit /dub path
  const ANIME_SERVERS_EN = [
    { name: 'VidSrc Anime',  fn: (mal, ep) => `https://vidsrc.cc/v2/embed/anime/${mal}/${ep}/dub` },
    { name: 'VidLink Anime', fn: (mal, ep) => `https://vidlink.pro/anime/${mal}/${ep}/dub?fallback=true` },
    { name: 'MovieSrc',      fn: (mal, ep) => `https://movie-src.xyz/v1/embed/anime/${mal}/${ep}/dub` },
    { name: 'AutoEmbed',     fn: (mal, ep, slug) => `https://anime.autoembed.cc/embed/${slug}-episode-${ep}` },
    { name: 'LetsEmbed',     fn: (mal, ep, slug, tmdb) => `https://letsembed.cc/embed/anime/?id=${tmdb}/1/${ep}` },
    { name: 'TMDBApi',       fn: (mal, ep, slug, tmdb) => `https://www.tmdbapi.xyz/anime/${tmdb}-1-${ep}` },
  ];

  // ─── ANIME SERVERS (Russian Dub — 720p-1080p) ──────────────────────
  // Kinobox = aggregator (Collaps, Vibix, Lumex, etc.) — no token needed
  // Kodik = down since March 20 2026, kept as fallback
  const ANIME_SERVERS_RU = [
    { name: 'Kinobox',        fn: null, dynamic: true }, // Special: fetches player URLs via API
    { name: 'Collaps',        fn: (mal, ep, slug, tmdb, kpId) => kpId ? `https://api.namy.ws/embed/kp/${kpId}` : null, needsKP: true },
    { name: 'Vibix',          fn: (mal, ep, slug, tmdb, kpId) => kpId ? `https://675812196.videoframe2.com/embed-kp/${kpId}` : null, needsKP: true },
    { name: 'Kodik',          fn: (mal, ep) => `https://kodik.info/find-player?shikimoriID=${mal}&episode=${ep}&translation_type=voice` },
    { name: 'Kodik AniDUB',   fn: (mal, ep) => `https://kodik.info/find-player?shikimoriID=${mal}&episode=${ep}&only_translations=609,610&translation_type=voice` },
    { name: 'AutoEmbed RU',   fn: (mal, ep, slug) => `https://anime.autoembed.cc/embed/${slug}-episode-${ep}?server=3` },
    { name: 'LetsEmbed',      fn: (mal, ep, slug, tmdb) => `https://letsembed.cc/embed/anime/?id=${tmdb}/1/${ep}` },
    { name: 'TMDBApi',        fn: (mal, ep, slug, tmdb) => `https://www.tmdbapi.xyz/anime/${tmdb}-1-${ep}` },
    { name: 'VidSrc Sub',     fn: (mal, ep) => `https://vidsrc.cc/v2/embed/anime/${mal}/${ep}/sub` },
  ];

  // ─── KINOBOX + KINOPOISK HELPERS ──────────────────────────────────
  // Kinobox.tv aggregates Russian players (Collaps, Vibix, Lumex, Alloha, Kodik)
  // Can search by title — returns iframe URLs for all available players
  let kinoboxCache = {};
  let kinopoiskIdCache = {};

  async function fetchKinoboxPlayers(title) {
    const cacheKey = slugify(title);
    if (kinoboxCache[cacheKey]) return kinoboxCache[cacheKey];
    try {
      const res = await fetch(`https://kinobox.tv/api/players/main?title=${encodeURIComponent(title)}`);
      if (!res.ok) return [];
      const data = await res.json();
      // data is array of { source, iframeUrl, translation, quality }
      const players = (Array.isArray(data) ? data : []).filter(p => p.iframeUrl);
      kinoboxCache[cacheKey] = players;
      // Try to extract Kinopoisk ID from any player URL
      for (const p of players) {
        const kpMatch = p.iframeUrl.match(/kp[_/]?(\d{5,})/i);
        if (kpMatch) { kinopoiskIdCache[cacheKey] = kpMatch[1]; break; }
      }
      return players;
    } catch { return []; }
  }

  function getKinopoiskId(title) {
    return kinopoiskIdCache[slugify(title)] || null;
  }

  const ANIME_GENRES = [
    {id:16,name:'Animation'},{id:10759,name:'Action'},{id:35,name:'Comedy'},{id:18,name:'Drama'},
    {id:10765,name:'Sci-Fi & Fantasy'},{id:10749,name:'Romance'},{id:9648,name:'Mystery'},
    {id:10751,name:'Family'},{id:80,name:'Crime'},{id:10768,name:'War'}
  ];

  const GENRES_MOVIE = [
    {id:28,name:'Action'},{id:12,name:'Adventure'},{id:16,name:'Animation'},{id:35,name:'Comedy'},
    {id:80,name:'Crime'},{id:99,name:'Documentary'},{id:18,name:'Drama'},{id:10751,name:'Family'},
    {id:14,name:'Fantasy'},{id:36,name:'History'},{id:27,name:'Horror'},{id:10402,name:'Music'},
    {id:9648,name:'Mystery'},{id:10749,name:'Romance'},{id:878,name:'Sci-Fi'},{id:53,name:'Thriller'},
    {id:10752,name:'War'},{id:37,name:'Western'}
  ];
  const GENRES_TV = [
    {id:10759,name:'Action'},{id:16,name:'Animation'},{id:35,name:'Comedy'},{id:80,name:'Crime'},
    {id:99,name:'Documentary'},{id:18,name:'Drama'},{id:10751,name:'Family'},{id:10762,name:'Kids'},
    {id:9648,name:'Mystery'},{id:10764,name:'Reality'},{id:10765,name:'Sci-Fi'},{id:10766,name:'Soap'},
    {id:10768,name:'War'}
  ];

  // Ad blocking is handled server-side via /proxy — injects ad-killer into embed HTML

  // ══════════════════════════════════════════════════════════════════════
  // STORAGE (localStorage + server sync — single global store, no user IDs)
  // ══════════════════════════════════════════════════════════════════════
  const storage = {
    get(key, fallback = null) { try { const v = localStorage.getItem(`omair_${key}`); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
    set(key, val) { localStorage.setItem(`omair_${key}`, JSON.stringify(val)); }
  };

  // ─── Server sync (fire-and-forget for writes, blocking for initial load) ──
  const API_BASE = window.location.origin;
  let serverSynced = false;

  async function syncToServer(endpoint, body) {
    try {
      await fetch(`${API_BASE}/api/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } catch {} // Silent fail — localStorage is the fallback
  }

  async function loadFromServer() {
    try {
      const res = await fetch(`${API_BASE}/api/sync`);
      if (!res.ok) return;
      const data = await res.json();
      // Merge server data into localStorage (server wins for newer entries)
      if (data.history) {
        const local = storage.get('history', {});
        Object.entries(data.history).forEach(([k, v]) => {
          if (!local[k] || (v.updated && v.updated > (local[k].updated || 0))) local[k] = v;
        });
        storage.set('history', local);
      }
      if (data.watchlist) {
        const local = storage.get('watchlist', {});
        Object.entries(data.watchlist).forEach(([k, v]) => {
          if (!local[k]) local[k] = v;
        });
        storage.set('watchlist', local);
      }
      if (data.episodes) {
        Object.entries(data.episodes).forEach(([seriesId, eps]) => {
          const local = storage.get(`eps_${seriesId}`, {});
          Object.assign(local, eps);
          storage.set(`eps_${seriesId}`, local);
        });
      }
      if (data.lastPage) storage.set('lastPage', data.lastPage);
      serverSynced = true;
    } catch {} // Offline — use localStorage only
  }

  // Full sync push (debounced)
  let syncTimer;
  function pushFullSync() {
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => {
      const history = storage.get('history', {});
      const watchlist = storage.get('watchlist', {});
      // Collect all episode data
      const episodes = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('omair_eps_')) {
          const seriesId = key.replace('omair_eps_', '');
          try { episodes[seriesId] = JSON.parse(localStorage.getItem(key)); } catch {}
        }
      }
      syncToServer('sync', { history, watchlist, episodes, lastPage: currentPage });
    }, 2000);
  }

  // ─── Data access functions (same API, now with sync) ──────────────
  function getHistory() { return storage.get('history', {}); }
  function saveToHistory(id, data) {
    const h = getHistory();
    h[id] = { ...h[id], ...data, updated: Date.now() };
    storage.set('history', h);
    syncToServer('history', { key: id, data: h[id] });
  }
  function getHistoryEntry(id) { return getHistory()[id] || null; }

  function getWatchlist() { return storage.get('watchlist', {}); }
  function toggleWatchlist(id, data) {
    const w = getWatchlist();
    if (w[id]) delete w[id]; else w[id] = { ...data, added: Date.now() };
    storage.set('watchlist', w);
    syncToServer('watchlist', { key: id, data });
    return !!w[id];
  }
  function isInWatchlist(id) { return !!getWatchlist()[id]; }

  function getWatchedEps(seriesId) { return storage.get(`eps_${seriesId}`, {}); }
  function markEpWatched(seriesId, s, e) {
    const eps = getWatchedEps(seriesId);
    eps[`${s}-${e}`] = true;
    storage.set(`eps_${seriesId}`, eps);
    syncToServer('episodes', { seriesId: String(seriesId), key: `${s}-${e}` });
  }
  function isEpWatched(seriesId, s, e) { return !!getWatchedEps(seriesId)[`${s}-${e}`]; }

  // Anime language preference
  function getAnimeLang() { return storage.get('anime_lang', 'en'); }
  function setAnimeLang(lang) { storage.set('anime_lang', lang); pushFullSync(); }

  // MAL ID cache
  const malCache = {};
  async function getMALId(tmdbId) {
    if (malCache[tmdbId]) return malCache[tmdbId];
    try {
      const data = await tmdb(`/tv/${tmdbId}/external_ids`);
      // TMDB doesn't have a direct MAL field, but we can use the TVDB → MAL mapping
      // Store what we have — the anime servers also accept TMDB IDs as fallback
      malCache[tmdbId] = { imdb: data.imdb_id, tvdb: data.tvdb_id };
      return malCache[tmdbId];
    } catch { return null; }
  }

  // Jikan API (MAL) to search by name and get MAL ID
  async function searchMAL(title) {
    try {
      const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1&sfw=true`);
      const data = await res.json();
      if (data.data && data.data.length > 0) return data.data[0].mal_id;
    } catch {}
    return null;
  }

  // ══════════════════════════════════════════════════════════════════════
  // API
  // ══════════════════════════════════════════════════════════════════════
  async function tmdb(path, params = {}) {
    const url = new URL(`${API}${path}`);
    url.searchParams.set('api_key', API_KEY);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    return res.json();
  }

  function slugify(title) {
    return (title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // ══════════════════════════════════════════════════════════════════════
  // ANIME PLAYER
  // ══════════════════════════════════════════════════════════════════════
  async function playAnime(tmdbId, title) {
    const hist = getHistoryEntry(`anime_${tmdbId}`);
    const ep = hist?.episode || 1;
    const season = hist?.season || 1;
    openAnimePlayer(tmdbId, title, season, ep);
  }

  function playAnimeEp(tmdbId, season, episode, title) {
    closeDetail();
    openAnimePlayer(tmdbId, title, season, episode);
  }

  async function openAnimePlayer(tmdbId, title, season, episode) {
    const slug = slugify(title);

    const frame = document.getElementById('playerFrame');
    const modal = document.getElementById('playerModal');
    const loader = document.getElementById('playerLoader');
    const episodeBar = document.getElementById('episodeBar');

    frame.src = '';
    loader.style.display = 'flex';
    document.getElementById('playerLoaderText').textContent = 'Resolving anime IDs...';
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

    document.getElementById('playerTitle').textContent = title;
    document.getElementById('playerMeta').textContent = `${animeLang === 'en' ? '🇬🇧 ENG' : '🇷🇺 RUS'} · Episode ${episode}`;

    // Fetch MAL ID + Kinobox players in parallel
    let malId = null;
    let kinoboxPlayers = [];
    const [malResult, kinoboxResult, posterResult] = await Promise.allSettled([
      searchMAL(title),
      animeLang === 'ru' ? fetchKinoboxPlayers(title) : Promise.resolve([]),
      getPoster(tmdbId),
    ]);
    if (malResult.status === 'fulfilled') malId = malResult.value;
    if (kinoboxResult.status === 'fulfilled') kinoboxPlayers = kinoboxResult.value;
    const poster = posterResult.status === 'fulfilled' ? posterResult.value : '';

    const kpId = getKinopoiskId(title);

    playerState = {
      type: 'tv', id: tmdbId, season, episode,
      serverIndex: 0, autoTrying: true, triedServers: new Set(),
      isAnime: true, malId: malId || tmdbId, slug, animeTitle: title,
      kpId, kinoboxPlayers
    };

    saveToHistory(`anime_${tmdbId}`, { type: 'anime', tmdbId, title, poster, season, episode });
    markEpWatched(tmdbId, season, episode);

    // Load episode bar
    episodeBar.classList.remove('hidden');
    try {
      const data = await tmdb(`/tv/${tmdbId}`);
      const seasons = data.seasons || [];
      await loadAnimePlayerEpisodes(tmdbId, seasons, season, episode, title);
    } catch {}

    // Build effective server list for Russian (merge Kinobox results)
    const servers = buildAnimeServers();
    renderAnimeServerList(servers);
    autoTryAnimeServers(servers);
  }

  // Build the final server list, injecting Kinobox results for Russian
  function buildAnimeServers() {
    if (animeLang === 'en') return ANIME_SERVERS_EN;

    const servers = [];
    // First: inject Kinobox dynamic results as individual servers
    if (playerState.kinoboxPlayers && playerState.kinoboxPlayers.length > 0) {
      playerState.kinoboxPlayers.forEach(p => {
        const label = p.source || 'Kinobox';
        const qual = p.quality ? ` ${p.quality}` : '';
        const voice = p.translation ? ` (${p.translation})` : '';
        servers.push({
          name: `${label}${qual}${voice}`.slice(0, 30),
          fn: () => p.iframeUrl,
          fromKinobox: true
        });
      });
    }
    // Then: add static servers from ANIME_SERVERS_RU (skip the Kinobox placeholder)
    ANIME_SERVERS_RU.forEach(s => {
      if (s.dynamic) return; // skip the Kinobox placeholder
      servers.push(s);
    });
    return servers;
  }

  async function getPoster(tmdbId) {
    try {
      const data = await tmdb(`/tv/${tmdbId}`);
      return data.poster_path ? `${IMG_W500}${data.poster_path}` : '';
    } catch { return ''; }
  }

  async function loadAnimePlayerEpisodes(tmdbId, seasons, currentSeason, currentEp, title) {
    const select = document.getElementById('seasonSelect');
    select.innerHTML = seasons.filter(s => s.season_number > 0)
      .map(s => `<option value="${s.season_number}" ${s.season_number === currentSeason ? 'selected' : ''}>Season ${s.season_number}</option>`)
      .join('');
    select.onchange = () => loadAnimePlayerEpList(tmdbId, parseInt(select.value), currentEp, title);
    loadAnimePlayerEpList(tmdbId, currentSeason, currentEp, title);
  }

  async function loadAnimePlayerEpList(tmdbId, seasonNum, highlightEp, title) {
    const list = document.getElementById('episodeList');
    try {
      const data = await tmdb(`/tv/${tmdbId}/season/${seasonNum}`);
      list.innerHTML = (data.episodes || []).map(ep => {
        const isCurrent = seasonNum === playerState.season && ep.episode_number === playerState.episode;
        const watched = isEpWatched(tmdbId, seasonNum, ep.episode_number);
        return `<button onclick="switchAnimeEp(${seasonNum}, ${ep.episode_number}, '${(title||playerState.animeTitle).replace(/'/g, "\\'")}')"
          class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border transition
            ${isCurrent ? 'bg-anime border-anime text-white' : watched ? 'border-anime/30 text-anime/70 bg-anime/5' : 'border-white/10 text-gray-500 hover:border-white/20 hover:text-white'}">
          E${ep.episode_number}
        </button>`;
      }).join('');
    } catch {}
  }

  function switchAnimeEp(season, episode, title) {
    playerState.season = season;
    playerState.episode = episode;
    playerState.serverIndex = 0;
    playerState.autoTrying = true;
    playerState.triedServers = new Set();
    document.getElementById('playerMeta').textContent = `${animeLang === 'en' ? '🇬🇧 ENG' : '🇷🇺 RUS'} · Episode ${episode}`;

    saveToHistory(`anime_${playerState.id}`, { season, episode });
    markEpWatched(playerState.id, season, episode);

    const servers = buildAnimeServers();
    renderAnimeServerList(servers);
    autoTryAnimeServers(servers);
    loadAnimePlayerEpList(playerState.id, season, episode, title);
  }

  function renderAnimeServerList(servers) {
    const list = document.getElementById('serverList');
    list.innerHTML = servers.map((s, i) => {
      const isActive = i === playerState.serverIndex;
      const tried = playerState.triedServers.has(i) && !isActive;
      const trying = isActive && playerState.autoTrying;
      return `<button onclick="manualAnimeServer(${i})" class="server-btn px-2.5 py-1 rounded-lg border border-white/10 text-[11px] font-medium text-gray-400 flex items-center gap-1 flex-shrink-0
        ${isActive ? 'active' : ''} ${tried ? 'tried' : ''} ${trying ? 'trying' : ''}"
        style="${isActive ? 'background:#8b5cf6;border-color:#8b5cf6' : ''}">
        ${s.name}
      </button>`;
    }).join('');
  }

  function getAnimeServerUrl(servers, index) {
    const s = servers[index];
    if (!s || !s.fn) return '';
    let url;
    if (s.fromKinobox) url = s.fn();
    else url = s.fn(playerState.malId, playerState.episode, playerState.slug, playerState.id, playerState.kpId);
    return url || '';
  }

  function autoTryAnimeServers(servers) {
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');
    const loaderText = document.getElementById('playerLoaderText');
    const statusEl = document.getElementById('serverStatus');

    // Skip servers that return empty URLs (e.g. Collaps without Kinopoisk ID)
    while (playerState.serverIndex < servers.length) {
      const url = getAnimeServerUrl(servers, playerState.serverIndex);
      if (url) break;
      playerState.triedServers.add(playerState.serverIndex);
      playerState.serverIndex++;
    }
    if (playerState.serverIndex >= servers.length) {
      playerState.autoTrying = false;
      loader.style.display = 'none';
      statusEl.textContent = 'All servers tried — pick one';
      renderAnimeServerList(servers);
      return;
    }

    frame.src = '';
    loader.style.display = 'flex';
    loaderText.textContent = `Trying ${servers[playerState.serverIndex].name}...`;
    statusEl.textContent = 'Auto-trying servers...';

    const url = getAnimeServerUrl(servers, playerState.serverIndex);
    setTimeout(() => { if (url) frame.src = url; playerState.triedServers.add(playerState.serverIndex); renderAnimeServerList(servers); }, 200);

    clearTimeout(window._serverTimeout);
    window._serverTimeout = setTimeout(() => {
      if (!playerState.autoTrying) return;
      playerState.serverIndex++;
      if (playerState.serverIndex < servers.length) autoTryAnimeServers(servers);
      else { playerState.autoTrying = false; loader.style.display = 'none'; statusEl.textContent = 'All servers tried — pick one'; renderAnimeServerList(servers); }
    }, 6000);

    frame.onload = () => {
      playerState.autoTrying = false; loader.style.display = 'none';
      statusEl.textContent = servers[playerState.serverIndex].name;
      renderAnimeServerList(servers); clearTimeout(window._serverTimeout);
    };
  }

  function manualAnimeServer(index) {
    const servers = buildAnimeServers();
    playerState.autoTrying = false; playerState.serverIndex = index;
    clearTimeout(window._serverTimeout);
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');
    loader.style.display = 'flex';
    document.getElementById('playerLoaderText').textContent = `Loading ${servers[index].name}...`;
    frame.src = '';
    const url = getAnimeServerUrl(servers, index);
    setTimeout(() => { if (url) frame.src = url; playerState.triedServers.add(index); renderAnimeServerList(servers); }, 200);
    frame.onload = () => { loader.style.display = 'none'; document.getElementById('serverStatus').textContent = servers[index].name; renderAnimeServerList(servers); };
    setTimeout(() => { loader.style.display = 'none'; }, 8000);
  }

              </div>

          </div>
          ${(data.genres||[]).length ? `<div class="flex flex-wrap gap-1.5 mt-4 mb-3">${data.genres.map(g => `<span class="bg-white/5 border border-white/10 rounded-full px-2.5 py-0.5 text-[10px] text-gray-400">${g.name}</span>`).join('')}</div>` : ''}
          <p class="text-sm text-gray-400 leading-relaxed mb-6">${data.overview || ''}</p>
          ${type === 'tv' && seasons.length > 0 ? `
            <div class="mb-6">
              <h4 class="text-sm font-semibold mb-3 text-white/80">Seasons & Episodes</h4>
              <div class="flex gap-2 overflow-x-auto row-scroll pb-2 mb-3" id="detailSeasons">
                ${seasons.filter(s => s.season_number > 0).map(s => `
                  <button onclick="loadSeasonEpisodes(${id}, ${s.season_number})" class="detail-season-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10 text-gray-400 hover:border-crimson hover:text-crimson transition flex-shrink-0" data-s="${s.season_number}">
                    S${s.season_number} <span class="text-gray-600">(${s.episode_count})</span>
                  </button>`).join('')}
              </div>
              <div id="detailEpisodes" class="space-y-1"></div>
            </div>` : ''}
          ${cast.length > 0 ? `
            <div class="mb-6">
              <h4 class="text-sm font-semibold mb-3 text-white/80">Cast</h4>
              <div class="flex gap-3 overflow-x-auto row-scroll pb-2">
                ${cast.map(c => `
                  <div class="flex-shrink-0 text-center w-16">
                    <div class="w-14 h-14 rounded-full overflow-hidden bg-surface-4 mx-auto mb-1">
                      ${c.profile_path ? `<img src="${IMG_W500}${c.profile_path}" class="w-full h-full object-cover" />` : `<div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-gray-600"></i></div>`}
                    </div>
                    <p class="text-[10px] text-gray-400 truncate">${c.name}</p>
                  </div>`).join('')}
              </div>
            </div>` : ''}
          ${data.similar?.results?.length > 0 ? `
            <div>
              <h4 class="text-sm font-semibold mb-3 text-white/80">Similar</h4>
              <div class="flex gap-3 overflow-x-auto row-scroll pb-2">
                ${data.similar.results.slice(0,10).map(item => `<div class="flex-shrink-0 w-[120px]">${mediaCard(item, type)}</div>`).join('')}
              </div>
            </div>` : ''}
        </div>`;

      if (type === 'tv' && seasons.length > 0) {
        const firstSeason = seasons.find(s => s.season_number > 0)?.season_number || 1;
        loadSeasonEpisodes(id, firstSeason);
      }
    } catch {
      content.innerHTML = `<div class="p-8 text-center text-red-400">Failed to load details.</div>`;
    }
  }

  async function loadSeasonEpisodes(seriesId, seasonNum) {
    document.querySelectorAll('.detail-season-btn').forEach(btn => {
      const active = parseInt(btn.dataset.s) === seasonNum;
      btn.classList.toggle('border-crimson', active);
      btn.classList.toggle('text-crimson', active);
    });
    const container = document.getElementById('detailEpisodes');
    container.innerHTML = '<div class="skeleton h-12 rounded-lg"></div><div class="skeleton h-12 rounded-lg"></div>';
    try {
      const data = await tmdb(`/tv/${seriesId}/season/${seasonNum}`);
      container.innerHTML = (data.episodes || []).map(ep => {
        const watched = isEpWatched(seriesId, seasonNum, ep.episode_number);
        return `
          <div class="ep-btn flex items-center gap-3 p-3 rounded-lg bg-surface-3/50 hover:bg-surface-4 transition cursor-pointer group ${watched ? 'watched' : ''}"
               onclick="playEpisode(${seriesId}, ${seasonNum}, ${ep.episode_number})">
            <div class="text-xs font-mono text-gray-600 w-6 text-center flex-shrink-0">${ep.episode_number}</div>
            ${ep.still_path ? `<img src="${IMG_W500}${ep.still_path}" class="w-24 h-14 rounded object-cover flex-shrink-0 hidden sm:block" />` : ''}
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate ${watched ? 'text-gray-400' : 'text-white/90'}">${ep.name}</p>
              <p class="text-[10px] text-gray-600 truncate">${ep.overview || ''}</p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${watched ? '<span class="text-[10px] text-crimson font-medium">WATCHED</span>' : ''}
              <div class="bg-white/5 group-hover:bg-crimson/80 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fa-solid fa-play text-[10px] ml-0.5"></i></div>
            </div>
          </div>`;
      }).join('');
    } catch {
      container.innerHTML = '<p class="text-red-400 text-sm text-center py-4">Failed to load episodes.</p>';
    }
  }

  function closeDetail() { document.getElementById('detailModal').classList.add('hidden'); }

  function toggleWL(id, type, title, poster) {
    const key = `${type}_${id}`;
    const added = toggleWatchlist(key, { title, poster, type });
    const btn = document.getElementById('wlBtn');
    if (btn) btn.innerHTML = `<i class="fa-solid ${added ? 'fa-bookmark text-' + (type === 'anime' ? 'anime' : 'crimson') : 'fa-plus'}"></i> ${added ? 'In List' : 'Add to List'}`;
  }

  function removeFromWatchlist(key) {
    const w = getWatchlist();
    delete w[key];
    storage.set('watchlist', w);
    syncToServer('watchlist', { key, data: null });
    renderWatchlist(); // Re-render the page
  }

  // ══════════════════════════════════════════════════════════════════════
  // MOVIE/TV PLAYER
  // ══════════════════════════════════════════════════════════════════════
  function playFromDetail(id, type) {
    closeDetail();
    if (type === 'tv') {
      const hist = getHistoryEntry(`tv_${id}`);
      openPlayer(id, type, hist?.season || 1, hist?.episode || 1);
    } else {
      openPlayer(id, type);
    }
  }

  function playEpisode(seriesId, season, episode) {
    closeDetail();
    openPlayer(seriesId, 'tv', season, episode);
  }

  async function openPlayer(id, type, season = 1, episode = 1) {
    playerState = { type, id, season, episode, serverIndex: 0, autoTrying: true, triedServers: new Set(), isAnime: false };

    const frame = document.getElementById('playerFrame');
    const modal = document.getElementById('playerModal');
    const loader = document.getElementById('playerLoader');
    const episodeBar = document.getElementById('episodeBar');

    frame.src = '';
    loader.style.display = 'flex';
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

    try {
      const data = await tmdb(`/${type}/${id}`);
      const title = data.title || data.name;
      const poster = data.poster_path ? `${IMG_W500}${data.poster_path}` : '';
      document.getElementById('playerTitle').textContent = title;
      document.getElementById('playerMeta').textContent = type === 'tv' ? `Season ${season} · Episode ${episode}` : (data.release_date || '').split('-')[0];
      saveToHistory(`${type}_${id}`, { type, tmdbId: id, title, poster, ...(type === 'tv' ? { season, episode } : {}) });
      if (type === 'tv') markEpWatched(id, season, episode);
      if (type === 'tv') {
        episodeBar.classList.remove('hidden');
        await loadPlayerEpisodes(id, data.seasons || [], season, episode);
      } else {
        episodeBar.classList.add('hidden');
      }
    } catch {}

    // Try extracting a direct stream first (ad-free), fall back to iframe servers
    await tryExtractedStream();
  }

  let hlsInstance = null;

  async function tryExtractedStream() {
    const video = document.getElementById('hlsPlayer');
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');
    const loaderText = document.getElementById('playerLoaderText');
    const statusEl = document.getElementById('serverStatus');

    loaderText.textContent = 'Extracting ad-free stream...';

    try {
      const params = new URLSearchParams({ id: playerState.id, type: playerState.type });
      if (playerState.type === 'tv') { params.set('s', playerState.season); params.set('e', playerState.episode); }
      const res = await fetch(`/api/extract?${params}`);
      const data = await res.json();

      if (data.streams && data.streams.length > 0) {
        const stream = data.streams[0];
        const m3u8Url = `/hls-proxy?url=${encodeURIComponent(stream.url)}&ref=${encodeURIComponent(stream.referer || '')}`;

        // Show our player, hide iframe
        frame.style.display = 'none';
        frame.src = '';
        video.style.display = 'block';
        video.classList.remove('hidden');

        // Set up HLS
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

        if (Hls.isSupported()) {
          hlsInstance = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
          hlsInstance.loadSource(m3u8Url);
          hlsInstance.attachMedia(video);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.volume = 0.5;
            video.play().catch(() => {});
            loader.style.display = 'none';
            statusEl.textContent = `${stream.name} (Ad-Free)`;
          });
          hlsInstance.on(Hls.Events.ERROR, (e, d) => {
            if (d.fatal) {
              console.log('[HLS error, falling back to iframe]', d);
              hlsInstance.destroy(); hlsInstance = null;
              video.style.display = 'none';
              video.classList.add('hidden');
              frame.style.display = '';
              renderServerList();
              autoTryServers();
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Native HLS (Safari/iOS)
          video.src = m3u8Url;
          video.volume = 0.5;
          video.addEventListener('loadedmetadata', () => {
            video.play().catch(() => {});
            loader.style.display = 'none';
            statusEl.textContent = `${stream.name} (Ad-Free)`;
          }, { once: true });
          video.addEventListener('error', () => {
            video.style.display = 'none';
            video.classList.add('hidden');
            frame.style.display = '';
            renderServerList();
            autoTryServers();
          }, { once: true });
        }

        // Render server list with the extracted stream as first option
        const list = document.getElementById('serverList');
        const extractedBtns = data.streams.map((s, i) =>
          `<button onclick="switchExtractedStream(${i})" class="server-btn px-2.5 py-1 rounded-lg border text-[11px] font-medium flex-shrink-0 ${i === 0 ? 'active border-green-500 text-green-400' : 'border-white/10 text-gray-400'}">
            <i class="fa-solid fa-shield-halved mr-1 text-green-400" style="font-size:9px"></i>${s.name}
          </button>`
        ).join('');
        const iframeBtns = SERVERS.map((s, i) =>
          `<button onclick="switchToIframeServer(${i})" class="server-btn px-2.5 py-1 rounded-lg border border-white/10 text-[11px] font-medium text-gray-400 flex-shrink-0">${s.name}</button>`
        ).join('');
        list.innerHTML = extractedBtns + `<span class="text-[9px] text-gray-700 flex-shrink-0 px-1">|</span>` + iframeBtns;

        // Store streams for switching
        playerState.extractedStreams = data.streams;
        return; // Success — don't fall through to iframe
      }
    } catch (e) {
      console.log('[Extract failed]', e);
    }

    // No extracted streams — fall back to iframe servers
    renderServerList();
    autoTryServers();
  }

  function switchExtractedStream(index) {
    const stream = playerState.extractedStreams?.[index];
    if (!stream) return;
    const video = document.getElementById('hlsPlayer');
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');

    frame.style.display = 'none';
    frame.src = '';
    video.style.display = 'block';
    video.classList.remove('hidden');
    loader.style.display = 'flex';
    document.getElementById('playerLoaderText').textContent = `Loading ${stream.name}...`;

    const m3u8Url = `/hls-proxy?url=${encodeURIComponent(stream.url)}&ref=${encodeURIComponent(stream.referer || '')}`;

    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(m3u8Url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        video.volume = 0.5;
        video.play().catch(() => {});
        loader.style.display = 'none';
        document.getElementById('serverStatus').textContent = `${stream.name} (Ad-Free)`;
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = m3u8Url;
      video.volume = 0.5;
      video.onloadedmetadata = () => { video.play().catch(() => {}); loader.style.display = 'none'; };
    }
  }

  function switchToIframeServer(index) {
    const video = document.getElementById('hlsPlayer');
    const frame = document.getElementById('playerFrame');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.style.display = 'none';
    video.classList.add('hidden');
    video.src = '';
    frame.style.display = '';
    playerState.serverIndex = index;
    manualSwitchServer(index);
  }

  async function loadPlayerEpisodes(seriesId, seasons, currentSeason, currentEp) {
    const select = document.getElementById('seasonSelect');
    select.innerHTML = seasons.filter(s => s.season_number > 0)
      .map(s => `<option value="${s.season_number}" ${s.season_number === currentSeason ? 'selected' : ''}>Season ${s.season_number}</option>`).join('');
    select.onchange = () => loadPlayerEpisodeList(seriesId, parseInt(select.value), currentEp);
    loadPlayerEpisodeList(seriesId, currentSeason, currentEp);
  }

  async function loadPlayerEpisodeList(seriesId, seasonNum, highlightEp) {
    const list = document.getElementById('episodeList');
    try {
      const data = await tmdb(`/tv/${seriesId}/season/${seasonNum}`);
      list.innerHTML = (data.episodes || []).map(ep => {
        const isCurrent = seasonNum === playerState.season && ep.episode_number === playerState.episode;
        const watched = isEpWatched(seriesId, seasonNum, ep.episode_number);
        return `<button onclick="switchEpisode(${seasonNum}, ${ep.episode_number})"
          class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium border transition
            ${isCurrent ? 'bg-crimson border-crimson text-white' : watched ? 'border-crimson/30 text-crimson/70 bg-crimson/5' : 'border-white/10 text-gray-500 hover:border-white/20 hover:text-white'}">
          E${ep.episode_number}
        </button>`;
      }).join('');
    } catch {}
  }

  function switchEpisode(season, episode) {
    playerState.season = season;
    playerState.episode = episode;
    playerState.serverIndex = 0;
    playerState.autoTrying = true;
    playerState.triedServers = new Set();
    document.getElementById('playerMeta').textContent = `Season ${season} · Episode ${episode}`;
    saveToHistory(`tv_${playerState.id}`, { season, episode });
    markEpWatched(playerState.id, season, episode);
    tryExtractedStream();
    loadPlayerEpisodeList(playerState.id, season, episode);
  }

  function renderServerList() {
    const list = document.getElementById('serverList');
    list.innerHTML = SERVERS.map((s, i) => {
      const isActive = i === playerState.serverIndex;
      const tried = playerState.triedServers.has(i) && !isActive;
      const trying = isActive && playerState.autoTrying;
      return `<button onclick="manualSwitchServer(${i})" class="server-btn px-2.5 py-1 rounded-lg border border-white/10 text-[11px] font-medium text-gray-400 flex items-center gap-1 flex-shrink-0
        ${isActive ? 'active' : ''} ${tried ? 'tried' : ''} ${trying ? 'trying' : ''}">
        ${s.name}
      </button>`;
    }).join('');
  }

  function getServerUrl() {
    const s = SERVERS[playerState.serverIndex];
    return playerState.type === 'tv' ? s.tv(playerState.id, playerState.season, playerState.episode) : s.movie(playerState.id);
  }

  function autoTryServers() {
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');
    const loaderText = document.getElementById('playerLoaderText');
    const statusEl = document.getElementById('serverStatus');

    frame.src = '';
    loader.style.display = 'flex';
    loaderText.textContent = `Trying ${SERVERS[playerState.serverIndex].name}...`;
    statusEl.textContent = 'Auto-trying servers...';

    setTimeout(() => { frame.src = getServerUrl(); playerState.triedServers.add(playerState.serverIndex); renderServerList(); }, 200);

    clearTimeout(window._serverTimeout);
    window._serverTimeout = setTimeout(() => {
      if (!playerState.autoTrying) return;
      const next = playerState.serverIndex + 1;
      if (next < SERVERS.length) { playerState.serverIndex = next; autoTryServers(); }
      else { playerState.autoTrying = false; loader.style.display = 'none'; statusEl.textContent = 'All servers tried — pick one'; renderServerList(); }
    }, 6000);

    frame.onload = () => { playerState.autoTrying = false; loader.style.display = 'none'; statusEl.textContent = SERVERS[playerState.serverIndex].name; renderServerList(); clearTimeout(window._serverTimeout); };
  }

  function manualSwitchServer(index) {
    playerState.autoTrying = false;
    playerState.serverIndex = index;
    clearTimeout(window._serverTimeout);
    const frame = document.getElementById('playerFrame');
    const loader = document.getElementById('playerLoader');
    loader.style.display = 'flex';
    document.getElementById('playerLoaderText').textContent = `Loading ${SERVERS[index].name}...`;
    frame.src = '';
    setTimeout(() => { frame.src = getServerUrl(); playerState.triedServers.add(index); renderServerList(); }, 200);
    frame.onload = () => { loader.style.display = 'none'; document.getElementById('serverStatus').textContent = SERVERS[index].name; renderServerList(); };
    setTimeout(() => { loader.style.display = 'none'; }, 8000);
  }

  function closePlayer() {
    playerState.autoTrying = false;
    clearTimeout(window._serverTimeout);
    clearTimeout(window._proxyFallback);
    document.getElementById('playerFrame').src = '';
    const video = document.getElementById('hlsPlayer');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.src = '';
    video.style.display = 'none';
    video.classList.add('hidden');
    document.getElementById('playerFrame').style.display = '';
    document.getElementById('playerModal').classList.add('hidden');
    document.body.style.overflow = '';
    navigate(currentPage, true);
  }

  // ══════════════════════════════════════════════════════════════════════
  // SEARCH
  // ══════════════════════════════════════════════════════════════════════
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    const dropdown = document.getElementById('searchDropdown');
    if (q.length < 2) { dropdown.classList.add('hidden'); return; }

    searchTimer = setTimeout(async () => {
      try {
        const data = await tmdb('/search/multi', { query: q });
        const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 8);

        if (results.length === 0) {
          dropdown.innerHTML = '<div class="p-4 text-sm text-gray-500 text-center">No results</div>';
        } else {
          dropdown.innerHTML = results.map(r => {
            const title = r.title || r.name;
            const year = (r.release_date || r.first_air_date || '').split('-')[0];
            const poster = r.poster_path ? `${IMG_W500}${r.poster_path}` : '';
            const type = r.media_type;
            const isAnime = type === 'tv' && r.genre_ids?.includes(16) && r.original_language === 'ja';
            return `
              <div onclick="document.getElementById('searchDropdown').classList.add('hidden'); document.getElementById('searchInput').value=''; ${isAnime ? `showAnimeDetail(${r.id})` : `showDetail(${r.id}, '${type}')`}"
                class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/5 cursor-pointer transition">
                <div class="w-10 h-14 rounded overflow-hidden bg-surface-4 flex-shrink-0">
                  ${poster ? `<img src="${poster}" class="w-full h-full object-cover" />` : ''}
                </div>
                <div class="min-w-0 flex-1">
                  <p class="text-sm font-medium truncate">${title}</p>
                  <p class="text-[10px] text-gray-500">${year} · ${isAnime ? 'Anime' : type === 'tv' ? 'Series' : 'Movie'}</p>
                </div>
                <span class="text-[10px] uppercase border rounded px-1.5 py-0.5 ${isAnime ? 'text-anime border-anime/30' : 'text-gray-600 border-white/10'}">${isAnime ? 'Anime' : type}</span>
              </div>`;
          }).join('');
        }
        dropdown.classList.remove('hidden');
      } catch {}
    }, 300);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#searchInput') && !e.target.closest('#searchDropdown')) {
      document.getElementById('searchDropdown').classList.add('hidden');
    }
  });

  // ══════════════════════════════════════════════════════════════════════
  // NAVIGATION
  // ══════════════════════════════════════════════════════════════════════
  function navigate(page, silent = false) {
    currentPage = page;
    if (!silent) currentGenre = null;
    if (!silent) { storage.set('lastPage', page); syncToServer('page', { page }); }

    document.querySelectorAll('.nav-link').forEach(btn => {
      const isActive = btn.dataset.page === page;
      btn.classList.toggle('text-white', isActive && page !== 'anime');
      btn.classList.toggle('bg-white/5', isActive);
      btn.classList.toggle('text-gray-400', !isActive && page !== 'anime');
    });

    switch(page) {
      case 'home': renderHome(); break;
      case 'movies': renderBrowse('movie'); break;
      case 'series': renderBrowse('tv'); break;
      case 'anime': renderAnime(); break;
      case 'watchlist': renderWatchlist(); break;
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function filterGenre(genreId, type) { currentGenre = genreId; renderBrowse(type); }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (!document.getElementById('playerModal').classList.contains('hidden')) closePlayer();
      else if (!document.getElementById('detailModal').classList.contains('hidden')) closeDetail();
    }
  });

  window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 50) nav.classList.add('bg-surface-1/95', 'backdrop-blur-md', 'border-b', 'border-white/5');
    else nav.classList.remove('bg-surface-1/95', 'backdrop-blur-md', 'border-b', 'border-white/5');
  });

  // ══════════════════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════════════════
  (async () => {
    // Load server data first (merges with localStorage)
    await loadFromServer();
    // Navigate to last page if we have one, otherwise home
    const lastPage = storage.get('lastPage', 'home');
    navigate(lastPage);
  })();
  </script>
</body>
